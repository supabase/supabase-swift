openapi: 3.0.0
info:
  title: Supabase Edge Functions API
  version: '1.0'
tags: []
paths:
  /functions/v1/{functionName}:
    get:
      operationId: FunctionInvocations_invokeGet
      parameters:
        - name: functionName
          in: path
          required: true
          schema:
            type: string
        - name: x-region
          in: header
          required: false
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FunctionsError'
